<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Loja Escolar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="brand">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M2 12l6-8 6 16 6-8" stroke="#0EA5E9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <div>
          <h1>Loja Escolar</h1>
          <small class="tagline">Estilo, qualidade e preço justo</small>
        </div>
      </div>
      <div class="search-cart">
        <input id="search" aria-label="Pesquisar produtos" placeholder="Buscar produtos, ex: tênis, mochila..." />
        <button id="cartBtn" aria-pressed="false">🛒 <span id="cartCount">0</span></button>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="hero-inner">
          <h2>As melhores marcas | Preços que cabem no seu bolso</h2>
          <p>Encontre produtos esportivos e escolares com qualidade e design moderno.</p>
          <a href="#products" class="btn-primary">Ver Catálogo</a>
        </div>
      </section>

      <section class="filters">
        <label>Categoria
          <select id="categoriaFilter">
            <option value="">Todas</option>
          </select>
        </label>
        <label>Ordenar
          <select id="sortSelect">
            <option value="">Padrão</option>
            <option value="preco_asc">Preço ↑</option>
            <option value="preco_desc">Preço ↓</option>
            <option value="nome_asc">Nome A→Z</option>
          </select>
        </label>
        <div class="extras">
          <button id="exportCsv">Exportar CSV</button>
          <button id="exportJson">Exportar JSON</button>
        </div>
      </section>

      <section id="products" class="products-grid" aria-live="polite">
        <!-- cards serão injetados aqui -->
      </section>
    </main>

    <div id="cartDrawer" class="cart-drawer" aria-hidden="true">
      <h2>Carrinho</h2>
      <div id="cartItems"></div>
      <div class="cart-total">Total: R$ <span id="cartTotal">0.00</span></div>
      <div class="cart-actions">
        <input id="cupom" placeholder="Cupom" aria-label="Código do cupom" />
        <button id="applyCoupon">Aplicar</button>
        <button id="confirmOrder">Confirmar pedido</button>
      </div>
    </div>

    <!-- Product modal -->
    <div id="productModal" class="modal" aria-hidden="true">
      <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <button class="modal-close" id="modalClose">×</button>
        <img id="modalImage" src="" alt="" />
        <h3 id="modalTitle"></h3>
        <p id="modalDescription"></p>
        <div class="modal-meta">
          <div class="price" id="modalPrice"></div>
          <div>Estoque: <span id="modalStock"></span></div>
        </div>
        <div class="modal-actions">
          <label>Quantidade <input id="modalQty" type="number" min="1" value="1" /></label>
          <button id="modalAdd">Adicionar ao carrinho</button>
        </div>
      </div>
    </div>

    <script src="scripts.js"></script>
  </body>
</html>
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Loja Escolar</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <h1>Loja Escolar</h1>
  <button id="btnCarrinho">🛒 Carrinho <span id="badge">0</span></button>
</header>
<main>
  <h2>Produtos</h2>
  <div id="produtosGrid" class="grid"></div>
</main>
<script src="scripts.js"></script>
</body>
</html>
